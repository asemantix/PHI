  <text x="512" y="78" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="15" letter-spacing="7" fill="#d4b888">ÉCHANGEZ · SIGNEZ · PROUVEZ</text>
  <line x1="620" y1="74" x2="668" y2="74" stroke="#c4a472" stroke-opacity="0.5" stroke-width="1"/>


<style>
:root{--navy:#0e1c35;--navy2:#08111f;--or:#c8a84b;--ivoire:#e8dcc8;--papier:#fafaf7}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 120% at 50% 0%,#13243f 0%,var(--navy2) 70%);
  color:var(--ivoire);font-family:"IBM Plex Mono",monospace;min-height:100vh;
  display:flex;flex-direction:column;align-items:center}
.head{text-align:center;padding:22px 16px 6px}
.head h1{font-family:"Playfair Display",serif;font-style:italic;font-weight:500;margin:0;
  font-size:30px;letter-spacing:.5px}
.phi{font-family:"EB Garamond",serif;font-style:italic;color:var(--or);font-size:1.08em;vertical-align:baseline}
.head p{margin:6px 0 0;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.6}
.topbar{display:flex;justify-content:space-between;align-items:center;width:min(92vw,520px);
  margin:14px auto 4px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.topbar .theme{color:var(--or)}
.topbar .counter{opacity:.6}
.stage{position:relative;width:min(92vw,520px);height:min(132vw,720px);display:flex;
  align-items:center;justify-content:center}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(10px) scale(.985);transition:opacity .5s ease,transform .5s ease;
  pointer-events:none}
.slide.active{opacity:1;transform:none;pointer-events:auto}
.slide .ph{height:100%;display:flex;align-items:center;justify-content:center}
.slide .ph svg{height:100%;width:auto;max-width:100%;
  filter:drop-shadow(0 18px 40px rgba(0,0,0,.55))}
.slide.wide{align-items:center}
.slide.wide .ph{width:100%;height:auto}
.slide.wide .ph svg{width:100%;height:auto;max-height:100%}
.cap{font-family:"Playfair Display",serif;font-style:italic;font-size:18px;text-align:center;
  min-height:46px;display:flex;align-items:center;justify-content:center;padding:10px 16px;
  width:min(92vw,520px)}
.prog{width:min(92vw,520px);height:3px;background:rgba(232,220,200,.15);border-radius:3px;overflow:hidden}
.prog .bar{height:100%;width:0;background:var(--or);transition:width .4s linear}
.controls{display:flex;align-items:center;gap:14px;margin:16px 0 6px}
.controls button{background:transparent;border:1px solid rgba(200,168,75,.5);color:var(--ivoire);
  width:46px;height:46px;border-radius:50%;font-size:18px;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center}
.controls button:hover{border-color:var(--or);color:var(--or);background:rgba(200,168,75,.08)}
.controls #play{width:58px;height:58px;font-size:22px;border-color:var(--or)}
.controls .speed{background:transparent;color:var(--ivoire);border:1px solid rgba(232,220,200,.25);
  border-radius:20px;padding:6px 10px;font-family:inherit;font-size:11px;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:min(94vw,720px);
  margin:8px 0 30px;padding:0 10px}
.chip{background:rgba(232,220,200,.06);border:1px solid rgba(232,220,200,.18);color:var(--ivoire);
  font-family:inherit;font-size:10px;letter-spacing:.5px;padding:6px 10px;border-radius:16px;
  cursor:pointer;transition:.2s;opacity:.7}
.chip:hover{opacity:1;border-color:var(--or);color:var(--or)}
.chip.on{background:var(--or);color:var(--navy2);border-color:var(--or);opacity:1}
</style></head>

const slides=[...document.querySelectorAll('.slide')];
const total=slides.length;

const $=id=>document.getElementById(id);
const wrapPhi=t=>t.replace(/\u03a6/g,'<i class="phi">\u03a6</i>');
function show(i){
  cur=(i+total)%total;
  slides.forEach((s,k)=>s.classList.toggle('active',k===cur));
  $('theme').innerHTML=wrapPhi(META[cur].theme);
  $('counter').textContent=(cur+1)+' / '+total;
  $('cap').innerHTML=wrapPhi(META[cur].cap);
  $('bar').style.width=((cur+1)/total*100)+'%';

  let on=0; CHIPS.forEach((c,k)=>{if(c.i<=cur)on=k;});
  document.querySelectorAll('.chip').forEach((el,k)=>el.classList.toggle('on',k===on));
}
function next(){show(cur+1);}
function prev(){show(cur-1);}
function tick(){timer=setTimeout(()=>{next();tick();},dur);}
function play(){playing=true;$('play').innerHTML='&#10073;&#10073;';tick();}
function pause(){playing=false;$('play').innerHTML='&#9654;';clearTimeout(timer);}

$('prev').onclick=()=>{pause();prev();};

});
